name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  apk:
    name: Generate APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Set execution flag for gradlew
        run: chmod +x gradlew
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Install Android Build Tools
        run: sdkmanager "build-tools;29.0.3"
      - name: Build APK
        run: bash ./gradlew assembleFossRelease --stacktrace
      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: composeApp/build/outputs/apk/foss/release
          signingKeyBase64: ${{ secrets.KEYSTORE_B64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEYSTORE_PASSWORD }}
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: signed-apk
          path: composeApp/build/outputs/apk/foss/release/composeApp-foss-release-signed.apk

  dmg:
    name: Generate DMG
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Set execution flag for gradlew
        run: chmod +x gradlew
      - name: Build DMG
        run: bash ./gradlew packageDmg --stacktrace
      - name: Upload DMG Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dmg-package
          path: composeApp/build/compose/binaries/main/dmg/*.dmg

  msi:
    name: Generate MSI
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Build MSI
        run: ./gradlew packageMsi --stacktrace
      - name: Upload MSI Artifact
        uses: actions/upload-artifact@v4
        with:
          name: msi-package
          path: composeApp/build/compose/binaries/main/msi/*.msi

  deb:
    name: Generate DEB
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Set execution flag for gradlew
        run: chmod +x gradlew
      - name: Build DEB
        run: ./gradlew packageDeb --stacktrace
      - name: Upload DEB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: composeApp/build/compose/binaries/main/deb/*.deb

  rpm:
    name: Generate RPM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Set execution flag for gradlew
        run: chmod +x gradlew
      - name: Install RPM build tools
        run: sudo apt-get update && sudo apt-get install -y rpm
      - name: Build RPM
        run: ./gradlew packageRpm --stacktrace
      - name: Upload RPM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpm-package
          path: composeApp/build/compose/binaries/main/rpm/*.rpm

  linux-tar:
    name: Generate Linux Tarball
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Set execution flag for gradlew
        run: chmod +x gradlew
      - name: Build application distribution
        run: ./gradlew createDistributable --stacktrace
      - name: Create tarball
        run: |
          cd composeApp/build/compose/binaries/main/app
          tar czf "$GITHUB_WORKSPACE/Kai-linux-x86_64.tar.gz" Kai
      - name: Upload Tarball Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-tar-package
          path: Kai-linux-x86_64.tar.gz

  appimage:
    name: Generate AppImage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Set execution flag for gradlew
        run: chmod +x gradlew
      - name: Install AppImage tools
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 file
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
      - name: Build application distribution
        run: ./gradlew createDistributable --stacktrace
      - name: Create AppDir structure
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/lib
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps

          # Copy distributable contents
          cp -r composeApp/build/compose/binaries/main/app/Kai/* AppDir/usr/lib/

          # Copy icon
          cp composeApp/icon.png AppDir/usr/share/icons/hicolor/256x256/apps/kai.png
          cp composeApp/icon.png AppDir/kai.png

          # Create desktop file
          cat > AppDir/kai.desktop << 'EOF'
          [Desktop Entry]
          Name=Kai
          Comment=AI Assistant Application
          Exec=kai
          Icon=kai
          Type=Application
          Categories=Utility;
          Terminal=false
          EOF
          cp AppDir/kai.desktop AppDir/usr/share/applications/

          # Create AppRun
          cat > AppDir/AppRun << 'EOF'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          export PATH="${HERE}/usr/lib/bin:${PATH}"
          export LD_LIBRARY_PATH="${HERE}/usr/lib/lib/runtime/lib:${LD_LIBRARY_PATH}"
          exec "${HERE}/usr/lib/bin/Kai" "$@"
          EOF
          chmod +x AppDir/AppRun
      - name: Build AppImage
        run: |
          ARCH=x86_64 ./appimagetool-x86_64.AppImage --appimage-extract-and-run AppDir Kai-x86_64.AppImage
      - name: Upload AppImage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: appimage-package
          path: Kai-*.AppImage

  flatpak:
    name: Generate Flatpak Bundle
    needs: linux-tar
    runs-on: ubuntu-latest
    container:
      image: bilelmoussaoui/flatpak-github-actions:freedesktop-24.08
      options: --privileged
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
      - name: Download Linux Tarball Artifact
        uses: actions/download-artifact@v4.1.7
        with:
          name: linux-tar-package
          path: flatpak/
      - name: Update manifest to use local tarball
        run: |
          python3 << 'EOF'
          import yaml
          with open('flatpak/io.github.djswiss.Kai.yaml', 'r') as f:
              manifest = yaml.safe_load(f)
          for module in manifest['modules']:
              if module['name'] == 'kai':
                  for i, source in enumerate(module['sources']):
                      if source.get('type') == 'file' and 'url' in source:
                          module['sources'][i] = {
                              'type': 'file',
                              'path': 'Kai-linux-x86_64.tar.gz',
                              'dest-filename': 'Kai-linux-x86_64.tar.gz'
                          }
                          break
          with open('flatpak/io.github.djswiss.Kai.yaml', 'w') as f:
              yaml.dump(manifest, f, default_flow_style=False, allow_unicode=True, sort_keys=False)
          EOF
      - name: Build Flatpak Bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: Kai.flatpak
          manifest-path: flatpak/io.github.djswiss.Kai.yaml
          cache-key: flatpak-builder-${{ github.sha }}
      - name: Upload Flatpak Artifact
        uses: actions/upload-artifact@v4
        with:
          name: flatpak-package
          path: Kai.flatpak

  ios:
    name: Generate iOS IPA
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Set execution flag for gradlew
        run: chmod +x gradlew
      - name: Setup signing
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$APPLE_PROVISIONING_PROFILE" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision
      - name: Build iOS framework
        run: bash ./gradlew :composeApp:assembleXCFramework --stacktrace
      - name: Archive iOS app
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild archive \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -sdk iphoneos \
            -archivePath $PWD/build/Kai.xcarchive \
            BUNDLE_ID="io.github.djswiss.kai" \
            TEAM_ID="$APPLE_TEAM_ID" \
            APP_NAME="Kai" \
            CODE_SIGN_STYLE=Manual
      - name: Export IPA
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cat > ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>ad-hoc</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath $PWD/build/Kai.xcarchive \
            -exportPath $PWD/build/ipa \
            -exportOptionsPlist ExportOptions.plist
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ipa/*.ipa

  release:
    name: Release APK, DMG, MSI, DEB, RPM, AppImage, Tarball, Flatpak and IPA
    needs: [apk, dmg, msi, deb, rpm, appimage, linux-tar, flatpak, ios]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Download APK Artifact
        uses: actions/download-artifact@v4.1.7
        with:
          name: signed-apk

      - name: Download DMG Artifact
        uses: actions/download-artifact@v4.1.7
        with:
          name: dmg-package

      - name: Download MSI Artifact
        uses: actions/download-artifact@v4.1.7
        with:
          name: msi-package

      - name: Download DEB Artifact
        uses: actions/download-artifact@v4.1.7
        with:
          name: deb-package

      - name: Download RPM Artifact
        uses: actions/download-artifact@v4.1.7
        with:
          name: rpm-package

      - name: Download AppImage Artifact
        uses: actions/download-artifact@v4.1.7
        with:
          name: appimage-package

      - name: Download Linux Tarball Artifact
        uses: actions/download-artifact@v4.1.7
        with:
          name: linux-tar-package

      - name: Download Flatpak Artifact
        uses: actions/download-artifact@v4.1.7
        with:
          name: flatpak-package

      - name: Download iOS IPA Artifact
        uses: actions/download-artifact@v4.1.7
        with:
          name: ios-ipa

      - name: List downloaded files (for debugging)
        run: ls -la

      - name: Get DMG filename
        id: dmg
        run: echo "file=$(ls *.dmg | head -n1)" >> $GITHUB_OUTPUT

      - name: Get MSI filename
        id: msi
        run: echo "file=$(ls *.msi | head -n1)" >> $GITHUB_OUTPUT

      - name: Get DEB filename
        id: deb
        run: echo "file=$(ls *.deb | head -n1)" >> $GITHUB_OUTPUT

      - name: Get RPM filename
        id: rpm
        run: echo "file=$(ls *.rpm | head -n1)" >> $GITHUB_OUTPUT

      - name: Get AppImage filename
        id: appimage
        run: echo "file=$(ls *.AppImage | head -n1)" >> $GITHUB_OUTPUT

      - name: Get version
        id: get_version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Create Github Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}

      - name: Upload APK to Github Release
        uses: actions/upload-release-asset@v1.0.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: composeApp-foss-release-signed.apk
          asset_name: Kai-${{ steps.get_version.outputs.version }}-android.apk
          asset_content_type: application/zip

      - name: Upload DMG to Github Release
        uses: actions/upload-release-asset@v1.0.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ steps.dmg.outputs.file }}
          asset_name: Kai-${{ steps.get_version.outputs.version }}-macos.dmg
          asset_content_type: application/octet-stream

      - name: Upload MSI to Github Release
        uses: actions/upload-release-asset@v1.0.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ steps.msi.outputs.file }}
          asset_name: Kai-${{ steps.get_version.outputs.version }}-windows.msi
          asset_content_type: application/octet-stream

      - name: Upload DEB to Github Release
        uses: actions/upload-release-asset@v1.0.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ steps.deb.outputs.file }}
          asset_name: Kai-${{ steps.get_version.outputs.version }}-linux.deb
          asset_content_type: application/octet-stream

      - name: Upload RPM to Github Release
        uses: actions/upload-release-asset@v1.0.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ steps.rpm.outputs.file }}
          asset_name: Kai-${{ steps.get_version.outputs.version }}-linux.rpm
          asset_content_type: application/octet-stream

      - name: Upload AppImage to Github Release
        uses: actions/upload-release-asset@v1.0.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ steps.appimage.outputs.file }}
          asset_name: Kai-${{ steps.get_version.outputs.version }}-linux.AppImage
          asset_content_type: application/octet-stream

      - name: Upload Linux Tarball to Github Release
        uses: actions/upload-release-asset@v1.0.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: Kai-linux-x86_64.tar.gz
          asset_name: Kai-${{ steps.get_version.outputs.version }}-linux-x86_64.tar.gz
          asset_content_type: application/gzip

      - name: Upload Flatpak to Github Release
        uses: actions/upload-release-asset@v1.0.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: Kai.flatpak
          asset_name: Kai-${{ steps.get_version.outputs.version }}-linux.flatpak
          asset_content_type: application/octet-stream

      - name: Get IPA filename
        id: ipa
        run: echo "file=$(ls *.ipa | head -n1)" >> $GITHUB_OUTPUT

      - name: Upload IPA to Github Release
        uses: actions/upload-release-asset@v1.0.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ steps.ipa.outputs.file }}
          asset_name: Kai-${{ steps.get_version.outputs.version }}-ios.ipa
          asset_content_type: application/octet-stream